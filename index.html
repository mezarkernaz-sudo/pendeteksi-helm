<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deployment Template</title>
    
    <!-- Core Library: ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    
    <style>
        :root { --accent-color: #007AFF; } /* Students can change this color! */
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { position: relative; width: 640px; height: 480px; border: 2px solid #333; border-radius: 10px; overflow: hidden; }
        video, canvas#overlay { position: absolute; top: 0; left: 0; width: 640px; height: 480px; }
        canvas#overlay { z-index: 10; pointer-events: none; }
        #status { margin: 15px; padding: 10px 20px; border-radius: 5px; background: #1e1e1e; font-weight: bold; border: 1px solid #444; }
        .btn-start { padding: 10px 25px; font-size: 1.2rem; cursor: pointer; background: var(--accent-color); color: white; border: none; border-radius: 5px; }
        #log-panel { width: 640px; margin-top: 20px; height: 150px; background: #1e1e1e; overflow-y: auto; border-radius: 5px; padding: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>🚀 AI Project: [Student Subject Name]</h1>
    
    <button id="btn-init" class="btn-start">ACTIVATE WEBCAM</button>
    <div id="status">STATUS: OFFLINE</div>

    <div class="container">
        <video id="webcam" playsinline muted></video>
        <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <div id="log-panel"><strong>Activity Log:</strong><br></div>

    <!-- Hidden processor for tensor conversion -->
    <canvas id="processor" width="640" height="640" style="display:none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
